<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>작심삼일 감지기</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"
    />
    <style>
      :root {
        --purple: #7c6dff;
        --purple-light: #f3f1ff;
        --dark-bg: #0a0a0c;
        --card-bg: #1c1c1e;
        --white: #ffffff;
        --text-sub: #8e8e93;
        --status-red: #ff3b30;
        --status-green: #34c759;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: "Pretendard", sans-serif;
        letter-spacing: -0.03em;
      }
      body {
        background: #000;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        overflow: hidden;
      }

      /* 기기 프레임 */
      .iphone-frame {
        width: 375px;
        height: 812px;
        background: var(--dark-bg);
        border-radius: 50px;
        position: relative;
        overflow: hidden;
        border: 8px solid #333;
        box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8);
      }

      /* 화면 네비게이션 */
      .screen {
        display: none;
        width: 100%;
        height: 100%;
        position: absolute;
        flex-direction: column;
        color: var(--white);
      }
      .screen.active {
        display: flex;
        animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: scale(0.95);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }

      .inner {
        padding: 24px;
        flex: 1;
        display: flex;
        flex-direction: column;
        padding-top: 60px;
        padding-bottom: 100px;
      }

      /* 로고 및 노이즈 효과 (실패 시) */
      .logo-container {
        position: relative;
        text-align: center;
      }
      .app-logo {
        width: 120px;
        height: auto;
        transition: 0.3s;
      }
      .noise-effect {
        position: absolute;
        top: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 120px;
        height: 120px;
        background: url("https://media.giphy.com/media/oEI9uWUeez9ZK/giphy.gif");
        mix-blend-mode: screen;
        opacity: 0;
        pointer-events: none;
      }
      .state-corrupted .app-logo {
        filter: grayscale(1) contrast(1.5);
        animation: shake 0.1s infinite;
      }
      .state-corrupted .noise-effect {
        opacity: 0.4;
      }

      @keyframes shake {
        0% {
          transform: translate(1px);
        }
        100% {
          transform: translate(-1px);
        }
      }

      /* UI 컴포넌트 */
      .custom-input {
        width: 100%;
        padding: 18px;
        border-radius: 15px;
        border: 1px solid #333;
        background: var(--card-bg);
        color: white;
        margin-bottom: 12px;
        outline: none;
      }
      .btn-main {
        width: 100%;
        padding: 18px;
        border-radius: 18px;
        border: none;
        font-weight: 800;
        font-size: 16px;
        cursor: pointer;
        transition: 0.2s;
      }
      .btn-purple {
        background: var(--purple);
        color: white;
      }
      .btn-ghost {
        background: var(--card-bg);
        color: var(--text-sub);
        border: 1px solid #333;
      }

      /* 기록 리스트 & Streak */
      .streak-card {
        background: linear-gradient(135deg, #1c1c1e 0%, #2c2c2e 100%);
        padding: 30px;
        border-radius: 30px;
        text-align: center;
        margin-bottom: 25px;
        border: 1px solid #333;
      }
      .badge-slot {
        display: inline-block;
        padding: 4px 12px;
        border-radius: 20px;
        font-size: 11px;
        font-weight: 700;
        margin-top: 10px;
      }
      .badge-silver {
        background: #e2e2e2;
        color: #333;
      }
      .badge-gold {
        background: #ffd700;
        color: #333;
        box-shadow: 0 0 15px rgba(255, 215, 0, 0.4);
      }

      /* 푸시 알림 팝업 */
      .push-alert {
        position: absolute;
        top: 20px;
        left: 10px;
        right: 10px;
        background: rgba(28, 28, 30, 0.95);
        border-left: 4px solid var(--purple);
        padding: 15px;
        border-radius: 12px;
        display: none;
        animation: slideDown 0.5s forwards;
        z-index: 1000;
      }
      @keyframes slideDown {
        from {
          transform: translateY(-100px);
        }
        to {
          transform: translateY(0);
        }
      }

      /* 하단 탭바 */
      .tab-bar {
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 85px;
        background: rgba(10, 10, 12, 0.9);
        display: none;
        justify-content: space-around;
        align-items: center;
        border-top: 1px solid #222;
        padding-bottom: 20px;
      }
      .tab-item {
        color: #555;
        font-size: 11px;
        text-align: center;
        cursor: pointer;
      }
      .tab-item.active {
        color: white;
      }
    </style>
  </head>
  <body>
    <div class="iphone-frame" id="system-frame">
      <div id="push-noti" class="push-alert">
        <div style="font-size: 12px; color: var(--purple); font-weight: 800">
          COMMAND CENTER
        </div>
        <div id="push-msg" style="font-size: 13px; margin-top: 4px">
          요원, 현재 의지력이 임계점에 도달했습니다. 즉시 보고하십시오.
        </div>
      </div>

      <div
        id="v-splash"
        class="screen active"
        style="justify-content: center; align-items: center"
      >
        <div class="logo-container">
          <img src="logo.png" class="app-logo" />
          <div class="noise-effect"></div>
        </div>
        <h1 style="font-size: 28px; font-weight: 900; margin-top: 20px">
          작심삼일 <span style="color: var(--purple)">감지기</span>
        </h1>
      </div>

      <div id="v-login" class="screen">
        <div class="inner" style="justify-content: center">
          <h2
            style="
              font-size: 26px;
              margin-bottom: 40px;
              font-weight: 800;
              text-align: center;
            "
          >
            LOGIN
          </h2>
          <input type="text" class="custom-input" placeholder="ACCESS ID" />
          <input type="password" class="custom-input" placeholder="PASSCODE" />
          <button class="btn-main btn-purple" onclick="nav('v-main')">
            접속 승인
          </button>
          <p
            onclick="nav('v-signup')"
            style="
              text-align: center;
              margin-top: 25px;
              color: var(--text-sub);
              font-size: 13px;
              cursor: pointer;
            "
          >
            신규 요원 등록 프로토콜
          </p>
        </div>
      </div>

      <div id="v-main" class="screen">
        <div class="inner">
          <div
            style="
              display: flex;
              justify-content: space-between;
              margin-bottom: 20px;
            "
          >
            <img src="logo.png" style="width: 30px" />
            <span style="font-size: 12px; color: var(--text-sub)"
              >LOG: <span id="today-date">2026.04.23</span></span
            >
          </div>

          <div class="streak-card">
            <div
              style="
                font-size: 12px;
                color: var(--text-sub);
                margin-bottom: 5px;
              "
            ></div>
            <div style="font-size: 64px; font-weight: 900" id="main-streak-val">
              0
            </div>
            <div id="agent-rank-slot"></div>
          </div>

          <h3 style="font-size: 18px; margin-bottom: 15px">미이행 행동 감지</h3>
          <div id="habit-container">
            <div
              class="card"
              style="
                background: var(--card-bg);
                padding: 20px;
                border-radius: 20px;
                margin-bottom: 10px;
                display: flex;
                justify-content: space-between;
                border: 1px solid #333;
              "
            >
              <span>코딩 포트폴리오 작업</span>
              <span style="color: var(--status-red)">미완료</span>
            </div>
          </div>

          <button
            class="btn-main btn-purple"
            style="margin-top: auto"
            onclick="nav('v-write')"
          >
            기록 하기 +
          </button>
          <button
            class="btn-main btn-ghost"
            style="margin-top: 10px; color: var(--status-red)"
            onclick="triggerFailure()"
          >
            오늘은 포기할게요
          </button>
        </div>
      </div>

      <div id="v-write" class="screen">
        <div class="inner">
          <h2 style="margin-bottom: 20px">임무 완수 보고</h2>
          <div
            style="
              background: var(--card-bg);
              padding: 20px;
              border-radius: 20px;
              border: 1px solid var(--purple);
            "
          >
            <label style="font-size: 12px; color: var(--purple)"
              >행동 데이터 입력</label
            >
            <textarea
              id="report-input"
              class="custom-input"
              style="
                height: 150px;
                background: transparent;
                border: none;
                padding-left: 0;
              "
              placeholder="오늘 어떤 성공을 거두었습니까?"
            ></textarea>
          </div>
          <button
            class="btn-main btn-purple"
            style="margin-top: auto"
            onclick="saveRecord()"
          >
            보고 및 저장
          </button>
          <button
            class="btn-main btn-ghost"
            style="margin-top: 10px"
            onclick="nav('v-main')"
          >
            취소
          </button>
        </div>
      </div>

      <div id="v-mypage" class="screen">
        <div class="inner">
          <div style="text-align: center; margin-bottom: 30px">
            <div
              id="profile-img"
              style="
                width: 100px;
                height: 100px;
                border-radius: 50%;
                background: #262629;
                margin: 0 auto 15px;
                display: flex;
                justify-content: center;
                align-items: center;
                font-size: 40px;
                transition: 0.5s;
              "
            >
              🧑‍🚀
            </div>
            <h2 id="agent-name">요원 예디</h2>
            <div id="agent-badge-display"></div>
          </div>

          <div
            class="card"
            style="
              background: var(--card-bg);
              padding: 25px;
              border-radius: 25px;
              border: 1px solid #333;
            "
          >
            <h4 style="margin-bottom: 15px; color: var(--text-sub)">
              의지력 리포트
            </h4>
            <div style="display: flex; justify-content: space-around">
              <div style="text-align: center">
                <b style="font-size: 20px" id="stat-total">0</b>
                <p style="font-size: 11px; color: var(--text-sub)">총 보고</p>
              </div>
              <div style="text-align: center">
                <b
                  style="font-size: 20px; color: var(--status-green)"
                  id="stat-streak"
                  >0</b
                >
                <p style="font-size: 11px; color: var(--text-sub)">최고 기록</p>
              </div>
              <div style="text-align: center">
                <b
                  style="font-size: 20px; color: var(--status-red)"
                  id="stat-fail"
                  >0</b
                >
                <p style="font-size: 11px; color: var(--text-sub)">
                  시스템 이상
                </p>
              </div>
            </div>
          </div>

          <button class="btn-main btn-ghost" style="margin-top: auto">
            요원 설정
          </button>
        </div>
      </div>

      <div class="tab-bar" id="bottom-tabs">
        <div class="tab-item active" onclick="nav('v-main', this)">관제</div>
        <div class="tab-item" onclick="nav('v-mypage', this)">데이터</div>
      </div>
    </div>

    <script>
      let userData = {
        streak: 0,
        bestStreak: 0,
        failCount: 0,
        totalReports: 0,
        isCorrupted: false,
      };

      function nav(id, el) {
        document
          .querySelectorAll(".screen")
          .forEach((s) => s.classList.remove("active"));
        document.getElementById(id).classList.add("active");

        const tabs = document.getElementById("bottom-tabs");
        if (["v-main", "v-mypage"].includes(id)) tabs.style.display = "flex";
        else tabs.style.display = "none";

        if (el && el.classList.contains("tab-item")) {
          document
            .querySelectorAll(".tab-item")
            .forEach((t) => t.classList.remove("active"));
          el.classList.add("active");
        }
        updateUI();
      }

      // 스플래시 -> 로그인 지연
      setTimeout(() => {
        showPush("작전 개시. 요원의 생체 리듬 분석을 시작합니다.");
        setTimeout(() => nav("v-login"), 2500);
      }, 1000);

      function showPush(msg) {
        const push = document.getElementById("push-noti");
        document.getElementById("push-msg").innerText = msg;
        push.style.display = "block";
        setTimeout(() => {
          push.style.display = "none";
        }, 4000);
      }

      function saveRecord() {
        const input = document.getElementById("report-input");
        if (!input.value) return alert("행동 보고서를 작성하십시오.");

        userData.streak++;
        userData.totalReports++;
        if (userData.streak > userData.bestStreak)
          userData.bestStreak = userData.streak;
        userData.isCorrupted = false;

        input.value = "";
        showPush(`보고 완료. 현재 연속 ${userData.streak}일 성공 중입니다.`);
        nav("v-main");
      }

      function triggerFailure() {
        userData.streak = 0;
        userData.failCount++;
        userData.isCorrupted = true;
        showPush(
          "경고! 요원의 의지력이 임계점에 도달했습니다. 프로토콜 파괴 중.",
        );
        nav("v-mypage");
      }

      function updateUI() {
        // Streak 및 날짜 업데이트
        document.getElementById("main-streak-val").innerText = userData.streak;
        document.getElementById("stat-total").innerText = userData.totalReports;
        document.getElementById("stat-streak").innerText = userData.bestStreak;
        document.getElementById("stat-fail").innerText = userData.failCount;
        document.getElementById("today-date").innerText =
          new Date().toLocaleDateString();

        // 1. 패널티 시각화 (로고 노이즈 및 캐릭터 지침)
        const frame = document.getElementById("system-frame");
        const profileImg = document.getElementById("profile-img");
        if (userData.isCorrupted) {
          frame.classList.add("state-corrupted");
          profileImg.innerText = "😵‍💫"; // 지친 캐릭터
        } else {
          frame.classList.remove("state-corrupted");
          profileImg.innerText = "🧑‍🚀"; // 정상 캐릭터
        }

        // 2. 작은 성공의 보상 (등급 시스템)
        const rankSlot = document.getElementById("agent-rank-slot");
        const badgeDisplay = document.getElementById("agent-badge-display");
        let badgeHtml = "";

        if (userData.streak >= 7) {
          badgeHtml = `<span class="badge-slot badge-gold">GOLD SENSOR</span>`;
        } else if (userData.streak >= 3) {
          badgeHtml = `<span class="badge-slot badge-silver">SILVER SHIELD</span>`;
        }

        rankSlot.innerHTML = badgeHtml;
        badgeDisplay.innerHTML = badgeHtml;
      }
    </script>
  </body>
</html>

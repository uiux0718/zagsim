<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>작심삼일 감지기 - 희망 농장</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"
    />
    <style>
      :root {
        --primary: #7c6dff; /* 메인 퍼플 */
        --primary-light: #f0eeff;
        --bg: #ffffff;
        --gray-1: #1c1c1e;
        --gray-2: #8e8e93;
        --gray-3: #f2f2f7;
        --yellow: #ffd600;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Pretendard", sans-serif;
      }
      body {
        background-color: #222;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }

      /* 기기 프레임 */
      .device {
        width: 375px;
        height: 812px;
        background: var(--bg);
        border-radius: 40px;
        position: relative;
        overflow: hidden;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
      }

      .screen {
        display: none;
        width: 100%;
        height: 100%;
        padding: 60px 24px;
        flex-direction: column;
      }
      .screen.active {
        display: flex;
      }

      /* 공통 헤더/타이틀 */
      .nav-header {
        display: flex;
        align-items: center;
        margin-bottom: 24px;
        cursor: pointer;
      }
      .nav-header .back-icon {
        font-size: 20px;
        margin-right: 8px;
      }

      .logo-box {
        text-align: center;
        margin-top: 100px;
        margin-bottom: 40px;
      }
      .radar-svg {
        width: 80px;
        height: 80px;
        margin-bottom: 16px;
      }
      .main-title {
        font-size: 24px;
        font-weight: 700;
        color: var(--gray-1);
        text-align: center;
      }
      .main-title span {
        color: var(--primary);
      }

      /* 입력 폼 */
      .form-group {
        margin-bottom: 24px;
        border-bottom: 1px solid #d1d1d6;
        padding-bottom: 8px;
      }
      .form-group label {
        display: block;
        font-size: 12px;
        color: var(--gray-2);
        margin-bottom: 4px;
      }
      .form-group input {
        width: 100%;
        border: none;
        outline: none;
        font-size: 16px;
      }

      /* 버튼 */
      .btn {
        width: 100%;
        padding: 18px;
        border-radius: 12px;
        border: none;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: 0.2s;
      }
      .btn-primary {
        background: var(--primary);
        color: white;
        margin-top: auto;
      }
      .btn-secondary {
        background: var(--primary-light);
        color: var(--primary);
        margin-top: 12px;
      }
      .btn-gray {
        background: var(--gray-2);
        color: white;
        margin-top: 12px;
      }

      /* 소셜 로그인 */
      .social-group {
        display: flex;
        justify-content: center;
        gap: 12px;
        margin-bottom: 32px;
      }
      .social-icon {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 14px;
        color: white;
        cursor: pointer;
      }

      /* 리스트 아이템 (기록하기) */
      .item-card {
        background: var(--gray-3);
        padding: 18px;
        border-radius: 16px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 12px;
      }
      .item-label {
        display: flex;
        align-items: center;
        gap: 12px;
        font-weight: 500;
      }
      .checkbox {
        width: 24px;
        height: 24px;
        border: 2px solid #c7c7cc;
        border-radius: 6px;
        position: relative;
        cursor: pointer;
      }
      .checkbox.checked {
        background: #5856d6;
        border-color: #5856d6;
      }
      .checkbox.checked::after {
        content: "✔";
        color: white;
        font-size: 14px;
        position: absolute;
        left: 4px;
        top: 0px;
      }

      /* 마이페이지 */
      .profile-wrap {
        text-align: center;
        margin-bottom: 32px;
      }
      .profile-circle {
        width: 100px;
        height: 100px;
        border: 1.5px solid var(--primary);
        border-radius: 50%;
        margin: 0 auto 16px;
        position: relative;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 40px;
      }
      .cam-badge {
        position: absolute;
        bottom: 0;
        right: 0;
        width: 28px;
        height: 28px;
        background: #000;
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        color: white;
        font-size: 12px;
      }

      .menu-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
        margin-bottom: 40px;
        text-align: center;
        font-size: 12px;
        font-weight: 500;
      }
      .menu-row {
        padding: 16px 0;
        border-bottom: 1px solid var(--gray-3);
        display: flex;
        justify-content: space-between;
        align-items: center;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="device">
      <section
        id="splash"
        class="screen active"
        style="justify-content: center; align-items: center"
      >
        <img
          src="https://img.icons8.com/ios/100/7C6DFF/radar.png"
          class="radar-svg"
        />
        <h1 class="main-title">작심삼일 <span>감지기</span></h1>
      </section>

      <section id="start" class="screen">
        <div class="logo-box">
          <img
            src="https://img.icons8.com/ios/100/7C6DFF/radar.png"
            class="radar-svg"
          />
          <h1 class="main-title">작심삼일 <span>감지기</span></h1>
        </div>
        <div class="social-group">
          <div class="social-icon" style="background: #fee500">💬</div>
          <div class="social-icon" style="background: #03c75a">N</div>
          <div class="social-icon" style="background: #1877f2">f</div>
          <div class="social-icon" style="background: #000">A</div>
          <div class="social-icon" style="background: #ea4335">G</div>
        </div>
        <button
          class="btn"
          style="border: 1px solid #d1d1d6"
          onclick="go('login')"
        >
          이메일 로그인
        </button>
        <div
          style="
            text-align: center;
            margin-top: 24px;
            font-size: 13px;
            color: var(--gray-2);
          "
        >
          회원가입 &nbsp; | &nbsp; 로그인
        </div>
      </section>

      <section id="login" class="screen">
        <div class="nav-header" onclick="go('start')">
          <span class="back-icon">〈</span> 이메일 로그인
        </div>
        <div class="form-group">
          <label>이메일</label>
          <input type="text" placeholder="이메일을 입력하세요" />
        </div>
        <div class="form-group">
          <label>비밀번호</label>
          <input type="password" placeholder="비밀번호를 입력하세요" />
        </div>
        <button class="btn btn-primary" onclick="go('main')">로그인</button>
        <p
          style="
            text-align: center;
            font-size: 12px;
            color: var(--gray-2);
            margin-top: 16px;
          "
        >
          아이디 찾기 | 비밀번호 찾기
        </p>
      </section>

      <section id="main" class="screen">
        <div class="nav-header" style="margin-bottom: 8px">
          <span class="back-icon">〈</span>
        </div>
        <div
          style="
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 32px;
          "
        >
          <img
            src="https://img.icons8.com/ios/40/7C6DFF/radar.png"
            style="width: 30px"
          />
          <p style="font-weight: 600">
            오늘 뭐했지?
            <span style="color: var(--primary); font-size: 12px"
              >by 작심삼일</span
            >
          </p>
        </div>

        <div class="item-card">
          <div class="item-label">🏃 아침 10분 스트레칭</div>
          <div class="checkbox checked"></div>
        </div>
        <div class="item-card">
          <div class="item-label">💧 물 2L 마시기</div>
          <div class="checkbox checked"></div>
        </div>
        <div class="item-card">
          <div class="item-label">👟 10분 산책</div>
          <div class="checkbox checked"></div>
        </div>
        <div class="item-card">
          <div class="item-label">📖 공부하기</div>
          <div class="checkbox checked"></div>
        </div>

        <button class="btn btn-primary" onclick="go('confirm')">
          기록완료
        </button>
      </section>

      <section
        id="confirm"
        class="screen"
        style="text-align: center; justify-content: center"
      >
        <img
          src="https://img.icons8.com/ios/100/7C6DFF/radar.png"
          class="radar-svg"
          style="margin: 0 auto 24px"
        />
        <h2 style="font-size: 22px; margin-bottom: 48px">
          "오늘도 잘 해내셨나요?"
        </h2>
        <button class="btn btn-primary" onclick="go('success')">
          네, 완료했습니다!
        </button>
        <button class="btn btn-gray" onclick="go('main')">
          "오늘은 못 했어요"
        </button>
      </section>

      <section
        id="success"
        class="screen"
        style="text-align: center; justify-content: center"
      >
        <img
          src="https://img.icons8.com/ios/100/7C6DFF/radar.png"
          class="radar-svg"
          style="margin: 0 auto 24px"
        />
        <h2 style="font-size: 22px; margin-bottom: 40px">
          "위기를 넘기셨네요!"
        </h2>
        <button class="btn btn-primary" onclick="go('mypage')">
          메인 화면으로 돌아가기
        </button>
        <p style="margin-top: 24px; font-size: 14px; color: var(--gray-1)">
          "포기 확률이 12%로 뚝 떨어졌습니다."
        </p>
      </section>

      <section id="mypage" class="screen">
        <div class="profile-wrap">
          <p
            style="
              font-size: 12px;
              font-weight: 800;
              letter-spacing: 1px;
              margin-bottom: 24px;
            "
          >
            PROFILE
          </p>
          <div class="profile-circle">
            👤
            <div class="cam-badge">📷</div>
          </div>
          <h3 style="margin-top: 12px">YEDI 〉</h3>
          <p style="font-size: 13px; color: var(--gray-2); margin-top: 4px">
            3days &nbsp; @naver.com
          </p>
        </div>

        <div class="menu-grid">
          <div>📋<br />기록보기</div>
          <div>👥<br />습관관리</div>
          <div>⚙️<br />설정</div>
          <div onclick="go('start')">🚪<br />로그아웃</div>
        </div>

        <div class="menu-list">
          <div class="menu-row"><span>APP 설정</span> <span>〉</span></div>
          <div class="menu-row"><span>고객센터</span> <span>〉</span></div>
          <div class="menu-row"><span>약관 확인</span> <span>〉</span></div>
        </div>
      </section>
    </div>

    <script>
      // 화면 전환 함수
      function go(id) {
        document
          .querySelectorAll(".screen")
          .forEach((s) => s.classList.remove("active"));
        document.getElementById(id).classList.add("active");
      }

      // 스플래시 화면 1.5초 후 시작페이지로
      setTimeout(() => {
        go("start");
      }, 1500);

      // 체크박스 토글 기능
      document.querySelectorAll(".checkbox").forEach((cb) => {
        cb.addEventListener("click", function () {
          this.classList.toggle("checked");
        });
      });
    </script>
  </body>
</html>
